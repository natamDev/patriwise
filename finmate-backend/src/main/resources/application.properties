# AI Provider: "claude", "openai" ou "huggingface"
finmate.ai.provider=${AI_PROVIDER:huggingface}
finmate.claude.api-key=${CLAUDE_API_KEY:changeme}
finmate.openai.api-key=${OPENAI_API_KEY:changeme}
finmate.huggingface.api-key=${HUGGINGFACE_API_KEY:changeme}
finmate.huggingface.model=${HUGGINGFACE_MODEL:meta-llama/Llama-3.1-8B-Instruct}

# JWT
mp.jwt.verify.publickey.location=jwt-public.pem
mp.jwt.verify.issuer=finmate
smallrye.jwt.sign.key.location=jwt-private.pem

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=FinMate API
mp.openapi.extensions.smallrye.info.version=1.0.0

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178,https://patriwise.netlify.app
quarkus.http.cors.methods=GET,POST,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# --- Dev profile (H2 in-memory) ---
%dev.finmate.huggingface.api-key=${HUGGINGFACE_API_KEY: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}
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:finmate;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true

# --- Prod profile (PostgreSQL) ---
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}
%prod.quarkus.datasource.username=${DATABASE_USER}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD}
%prod.quarkus.datasource.jdbc.min-size=1
%prod.quarkus.datasource.jdbc.max-size=5
%prod.quarkus.hibernate-orm.schema-management.strategy=update

# --- Test profile (H2 in-memory) ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:finmate-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
